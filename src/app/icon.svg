<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1f15"/>
      <stop offset="100%" stop-color="#0a1a10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#22c55e" stroke-opacity="0.15" stroke-width="2"/>
  <!-- Gate/door shape left -->
  <rect x="120" y="140" width="56" height="232" rx="28" fill="url(#accent)"/>
  <!-- Gate/door shape right -->
  <rect x="336" y="140" width="56" height="232" rx="28" fill="url(#accent)"/>
  <!-- Top arch connecting the gate pillars -->
  <path d="M148 200 Q148 120 256 120 Q364 120 364 200" fill="none" stroke="url(#accent)" stroke-width="56" stroke-linecap="round"/>
  <!-- Payment arrow going through the gate -->
  <path d="M200 310 L312 310" stroke="white" stroke-width="32" stroke-linecap="round"/>
  <path d="M280 274 L324 310 L280 346" fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small glow dot -->
  <circle cx="148" cy="372" r="6" fill="#4ade80" opacity="0.8"/>
  <circle cx="364" cy="372" r="6" fill="#4ade80" opacity="0.8"/>
</svg>
